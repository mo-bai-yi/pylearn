title: FizzBuzz
description: |
  经典面试题 FizzBuzz！

  打印 1 到 15 的数字，但：
  - 如果数字能被 3 整除，打印 "Fizz"
  - 如果数字能被 5 整除，打印 "Buzz"
  - 如果数字能同时被 3 和 5 整除，打印 "FizzBuzz"
  - 否则打印数字本身

  每行打印一个结果。
initial_code: |
  # 请实现 FizzBuzz

  for i in range(1, 16):
      # 你的代码
      pass
tests:
  - input: ""
    expected: "1\n2\nFizz\n4\nBuzz\nFizz\n7\n8\nFizz\nBuzz\n11\nFizz\n13\n14\nFizzBuzz"
