title: 电话簿
description: |
  用字典实现一个简单的电话簿！

  创建一个字典 `contacts`，包含以下联系人：
  - "小明" → "138-0001-0001"
  - "小红" → "138-0002-0002"
  - "小刚" → "138-0003-0003"

  然后遍历字典，打印出所有联系人的姓名和电话，
  每行格式：`姓名: 电话`

  预期输出：
  ```
  小明: 138-0001-0001
  小红: 138-0002-0002
  小刚: 138-0003-0003
  ```
initial_code: |
  # 创建电话簿字典
  contacts = {
      "小明": "138-0001-0001",
      "小红": "138-0002-0002",
      "小刚": "138-0003-0003",
  }

  # 请遍历并打印
  # 你的代码
tests:
  - input: ""
    expected: "小明: 138-0001-0001\n小红: 138-0002-0002\n小刚: 138-0003-0003"
