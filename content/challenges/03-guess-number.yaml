title: 猜数字
description: |
  编写一个猜数字游戏！

  程序会随机生成一个 1-100 之间的数字，玩家每次猜一个数，
  程序提示"大了"或"小了"，直到猜中为止。

  需要用到 random.randint() 和 while 循环。
  示例输出：

  ```
  猜一个 1-100 之间的数字：50
  大了！
  猜一个 1-100 之间的数字：25
  小了！
  猜一个 1-100 之间的数字：37
  猜对了！
  ```
initial_code: |
  import random

  # 生成随机数
  secret = random.randint(1, 100)

  while True:
      guess = int(input("猜一个 1-100 之间的数字："))
      # 你的代码
