{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>📖 教程目录</h1>
    <p>共 {{ lessons|length }} 章，从零开始学 Python</p>
</div>

<div style="display:flex; flex-direction:column; gap:12px;">
    {% for lesson in lessons %}
    <a href="{{ url_for('lessons.lesson_view', lesson_id=lesson.id) }}" class="lesson-item">
        <div class="num">{{ loop.index }}</div>
        <div class="info">
            <h3>{{ lesson.title }}</h3>
            <p>第 {{ loop.index }} 章</p>
        </div>
        <div class="status">→</div>
    </a>
    {% endfor %}
</div>
{% endblock %}
